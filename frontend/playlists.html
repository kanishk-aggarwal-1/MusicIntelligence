<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MusicIntelligence - Playlists</title>
    <link rel="stylesheet" href="./styles.css?v=20260513-1" />
  </head>
  <body>
    <header class="hero">
      <h1>Playlists</h1>
      <p>Generate Spotify playlists with quality controls and explainability.</p>
      <nav class="topnav">
        <a href="./index.html">Home</a>
        <a href="./dashboard.html">Dashboard</a>
        <a href="./songs.html">Song Explorer</a>
        <a href="./filters.html">Filters</a>
        <a class="active" href="./playlists.html">Playlists</a>
        <a href="./features.html">Features</a>
      </nav>
      <p class="page-meta">API: <span id="apiBaseDisplay"></span></p>
    </header>

    <main class="page-grid">
      <section class="card">
        <h2>Preview and Generate</h2>
        <div class="row">
          <label for="playlistName">Playlist Name</label>
          <input id="playlistName" type="text" placeholder="MusicIntelligence Mix" />
        </div>
        <div class="row">
          <label for="playlistContextType">Context</label>
          <select id="playlistContextType">
            <option value="">General</option>
            <option value="focus">Focus</option>
            <option value="workout">Workout</option>
            <option value="late-night">Late-night</option>
            <option value="chill">Chill</option>
          </select>
        </div>
        <div class="row">
          <label for="playlistMaxTracks">Max Tracks</label>
          <input id="playlistMaxTracks" type="number" min="5" max="100" value="30" />
        </div>
        <div class="row">
          <label for="playlistDiversity">Diversity (0-1)</label>
          <input id="playlistDiversity" type="number" step="0.1" min="0" max="1" value="0.5" />
        </div>
        <div class="row">
          <label for="playlistFamiliarity">Familiarity (0-1)</label>
          <input id="playlistFamiliarity" type="number" step="0.1" min="0" max="1" value="0.5" />
        </div>
        <div class="row">
          <label for="playlistMinKnownRatio">Min Known Track Ratio</label>
          <input id="playlistMinKnownRatio" type="number" step="0.05" min="0" max="1" value="0.6" />
        </div>
        <div class="actions">
          <button data-action="previewPlaylist" type="button">Preview Playlist</button>
          <button data-action="generate" type="button">Generate Playlist</button>
        </div>
        <div id="playlistOutput" class="output"></div>
      </section>

      <section class="card">
        <h2>Saved Playlist History</h2>
        <div class="actions">
          <button data-action="loadPlaylistHistory" type="button">Load History</button>
        </div>
        <div class="row">
          <label for="generatedPlaylistId">Generated Playlist ID</label>
          <input id="generatedPlaylistId" type="number" min="1" placeholder="Preview or history item ID" />
        </div>
        <div class="actions">
          <button data-action="loadGeneratedPlaylist" type="button">Load Selected</button>
          <button data-action="regenerateGeneratedPlaylist" type="button">Regenerate Preview</button>
          <button data-action="createFromGeneratedPlaylist" type="button">Create on Spotify</button>
        </div>
        <div id="playlistHistoryOutput" class="output"></div>
      </section>
    </main>

    <script src="./config.js?v=20260529-1"></script>
    <script src="./app.js?v=20260513-1"></script>
  </body>
</html>
