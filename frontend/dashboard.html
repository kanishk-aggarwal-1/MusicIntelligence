<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MusicIntelligence - Dashboard</title>

  </head>
  <body>
    <header class="hero">
      <h1>Dashboard</h1>
      <p>Listening trends by day, week, hour, artist, and genre.</p>
      <nav class="topnav">
        <a href="./index.html">Home</a>
        <a class="active" href="./dashboard.html">Dashboard</a>
        <a href="./songs.html">Song Explorer</a>

      </nav>

    <main class="page-grid">
      <section class="card">
        <h2>Dashboard Graphs</h2>
        <div class="row">
          <label for="dashboardDays">Days</label>
          <input id="dashboardDays" type="number" min="1" max="365" value="30" />
          <label><input id="dashboardCompare" type="checkbox" /> Compare with previous period</label>
          <button data-action="dashboard" type="button">Load Dashboard Stats</button>
        </div>
        <div id="dashboardCharts" class="chart-grid"></div>
      </section>


    </main>

    <script src="./app.js?v=20260310-3"></script>
