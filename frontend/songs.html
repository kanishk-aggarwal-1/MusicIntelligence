<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MusicIntelligence - Song Explorer</title>
    <link rel="stylesheet" href="./styles.css?v=20260513-1" />
  </head>
  <body>
    <header class="hero">
      <h1>Song Explorer</h1>
      <p>Browse your library in one spreadsheet-style view with column filters, metadata status, and discovery provenance.</p>
      <nav class="topnav">
        <a href="./index.html">Home</a>
        <a href="./dashboard.html">Dashboard</a>
        <a class="active" href="./songs.html">Song Explorer</a>
        <a href="./filters.html">Filters</a>
        <a href="./playlists.html">Playlists</a>
        <a href="./features.html">Features</a>
      </nav>
      <p class="page-meta">API: <span id="apiBaseDisplay"></span></p>
    </header>

    <main class="page-grid">
      <section class="card">
        <h2>Song Table</h2>
        <div class="row">
          <label for="genre">Genre</label>
          <input id="genre" type="text" placeholder="e.g. rock (optional)" />
        </div>
        <div class="row">
          <label for="enrichmentStatus">Metadata Status</label>
          <input id="enrichmentStatus" type="text" placeholder="pending | partial | complete | failed" />
        </div>
        <div class="row">
          <label for="songQuickFilter">Quick Filter</label>
          <select id="songQuickFilter">
            <option value="">None</option>
            <option value="failed_enrichment">Failed Enrichment</option>
            <option value="partial_enrichment">Partial Enrichment</option>
            <option value="missing_tags">Missing Tags</option>
            <option value="missing_popularity">Missing Listeners/Playcount</option>
            <option value="high_popularity">High Popularity</option>
            <option value="recently_played">Recently Played</option>
            <option value="never_used_in_playlist">Never Used in Playlist</option>
            <option value="duplicate_candidates">Duplicate Candidates</option>
            <option value="hidden">Hidden Songs</option>
            <option value="active">Active Songs</option>
          </select>
          <label for="recentlyPlayedDays">Recent Days</label>
          <input id="recentlyPlayedDays" type="number" min="1" max="365" value="30" />
        </div>
        <div class="row">
          <label for="songLimit">Limit</label>
          <input id="songLimit" type="number" min="1" max="5000" value="1000" />
          <button data-action="songs" type="button">Get Songs</button>
        </div>
        <div id="songsOutput" class="output"></div>
      </section>

      <section class="card">
        <h2>Song Actions</h2>
        <div class="row">
          <label for="selectedSongId">Song ID</label>
          <input id="selectedSongId" type="number" min="1" placeholder="Select or enter a song ID" />
        </div>
        <div class="actions">
          <button data-action="songDetail" type="button">Load Detail</button>
          <button data-action="songRetryEnrichment" type="button">Retry Enrichment</button>
          <button data-action="songHide" type="button">Hide</button>
          <button data-action="songRestore" type="button">Restore</button>
        </div>
        <div id="songDetailOutput" class="output"></div>
      </section>
    </main>

    <script src="./config.js?v=20260529-1"></script>
    <script src="./app.js?v=20260513-1"></script>
  </body>
</html>
