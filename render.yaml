services:
  - type: web
    name: musicintelligence-api
    runtime: python
    buildCommand: python -m pip install -r requirements.txt
    startCommand: python -m uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /ops/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: DATABASE_URL
        fromDatabase:
          name: musicintelligence-db
          property: connectionString
      - key: BACKEND_CORS_ORIGINS
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: SPOTIFY_REDIRECT_URI
        sync: false
      - key: LASTFM_API_KEY
        sync: false
      - key: LASTFM_SHARED_SECRET
        sync: false
      - key: LASTFM_API_URL
        value: http://ws.audioscrobbler.com/2.0/
      - key: SESSION_ENCRYPTION_KEY
        sync: false

databases:
  - name: musicintelligence-db
    databaseName: musicintelligence
    user: musicintelligence
